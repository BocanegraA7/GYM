{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - GymPower</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
      /* Solo añadimos el ajuste de la rejilla que es único para el registro */
      .grid-form {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px 30px;
        text-align: left;
      }
      .full-width {
        grid-column: 1 / 3;
      }
      @media (max-width: 600px) {
        .grid-form { grid-template-columns: 1fr; }
        .full-width { grid-column: 1; }
      }
    </style>
</head>

<body>
    <div class="home-container" style="max-width: 800px;">
        <img src="https://www.svgrepo.com/show/18057/dumbbell.svg" alt="Pesas" 
             style="width: 50px; margin-bottom: 10px; filter: drop-shadow(0 0 5px var(--accent-color));">
        
        <h1>Registro en GymPower</h1>
        <p>Crea tu cuenta para empezar a entrenar</p>

        <form method="POST" class="grid-form">
            {% csrf_token %}

            <div>
                <label><i class="fas fa-user-circle"></i> Nombre de usuario:</label>
                <input type="text" name="username" placeholder="Ej: alan_24" required>
            </div>

            <div>
                <label><i class="fas fa-envelope"></i> Email:</label>
                <input type="email" name="email" placeholder="correo@ejemplo.com" required>
            </div>

            <div>
                <label><i class="fa-brands fa-telegram"></i> Chat id Telegram:</label>
                <input type="text" name="chat_id" placeholder="ID de Telegram" required>
            </div>

            <div>
                <label><i class="fas fa-id-card"></i> Nombre:</label>
                <input type="text" name="name" placeholder="Tu nombre" required>
            </div>

            <div>
                <label><i class="fas fa-lock"></i> Contraseña:</label>
                <input type="password" name="password1" placeholder="••••••••" required>
            </div>

            <div>
                <label><i class="fas fa-shield-alt"></i> Confirmar contraseña:</label>
                <input type="password" name="password2" placeholder="••••••••" required>
            </div>

            <div>
                <label><i class="fas fa-signature"></i> Apellidos:</label>
                <input type="text" name="last_name" placeholder="Tus apellidos" required>
            </div>

            <div>
                <label><i class="fas fa-calendar-alt"></i> Fecha de registro:</label>
                <input type="date" name="membership_date" required>
            </div>

            <div class="full-width">
                <label><i class="fas fa-users-cog"></i> Rol en el sistema:</label>
                <select name="roles" required>
                    <option value="" disabled selected>Selecciona un rol</option>
                    <option value="1">Administrador</option>
                    <option value="2">Entrenador</option>
                    <option value="3">Cliente</option>
                </select>
            </div>

            {% if error %}
            <p class="error full-width" style="color: var(--color-danger);">{{ error }}</p>
            {% endif %}

            <div class="actions full-width" style="margin-top: 20px;">
                <button type="submit" class="btn btn-inscribirse" style="width: 100%;">
                    Finalizar Registro
                </button>
                <a href="{% url 'login' %}" style="color: var(--accent-color); text-decoration: none; font-size: 0.9rem; margin-top: 10px;">
                    ¿Ya tienes cuenta? Inicia sesión aquí
                </a>
            </div>
        </form>
    </div>
</body>
</html>
