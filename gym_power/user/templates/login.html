{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - GymPower</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="auth-page">
    <div class="home-container">
        <img src="https://www.svgrepo.com/show/18057/dumbbell.svg" alt="Pesas" style="width: 60px; margin-bottom: 20px; filter: drop-shadow(0 0 5px var(--accent-color));">
        
        <h1>Bienvenido a GymPower</h1>
        <p>Entrena con los mejores</p>

        <form method="POST">
            {% csrf_token %}
            
            <div class="input-group" style="width: 100%; position: relative;">
                <input type="text" name="username" placeholder="Usuario" required>
            </div>
            
            <div class="input-group" style="width: 100%; position: relative;">
                <input type="password" name="password" id="password" placeholder="Contraseña" required>
                <i class="fa-solid fa-eye" id="togglePassword" onclick="togglePassword()" 
                   style="position: absolute; right: 15px; top: 25px; cursor: pointer; color: var(--text-dim);"></i>
            </div>

            <div class="actions" style="flex-direction: column; width: 100%;">
                <button type="submit" class="btn btn-inscribirse" style="width: 100%;">
                    Iniciar sesión
                </button>
                
                <div style="margin-top: 15px; display: flex; flex-direction: column; gap: 10px;">
                    <a href="{% url 'password_reset' %}" style="color: var(--accent-color); text-decoration: none; font-size: 0.9rem;">
                        ¿Olvidaste tu contraseña?
                    </a>
                    <a href="{% url 'signup' %}" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">
                        ¿No tienes cuenta? <span style="color: var(--color-primary);">Regístrate Ahora</span>
                    </a>
                </div>
            </div>

            {% if error %}
            <p style="color: var(--color-danger); margin-top: 15px;">{{ error }}</p>
            {% endif %}
        </form>
    </div>

    <script>
        function togglePassword() {
            const passwordField = document.getElementById("password");
            const toggleIcon = document.getElementById("togglePassword");
            const isPassword = passwordField.type === "password";

            passwordField.type = isPassword ? "text" : "password";
            toggleIcon.classList.toggle("fa-eye");
            toggleIcon.classList.toggle("fa-eye-slash");
        }
    </script>
</body>
</html>
